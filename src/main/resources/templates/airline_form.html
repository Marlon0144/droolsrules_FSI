<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Evaluador de Reglas de Aerolínea</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #0a1628 0%, #1a2d5a 50%, #0d2137 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
        }
        .section-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 14px;
        }
        .section-title {
            font-size: 0.80rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #e8eaf6;
            border-radius: 10px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #4fc3f7;
            box-shadow: 0 0 0 0.2rem rgba(79, 195, 247, 0.25);
            color: #e8eaf6;
        }
        .form-control::placeholder { color: rgba(200, 210, 230, 0.5); }
        .form-select option { background: #1a2d5a; color: #e8eaf6; }
        .form-label { color: #b0bec5; font-size: 0.88rem; font-weight: 500; }
        .form-check-label { color: #b0bec5; font-size: 0.88rem; }
        .form-check-input:checked { background-color: #4fc3f7; border-color: #4fc3f7; }
        .btn-evaluate {
            background: linear-gradient(90deg, #0288d1, #4fc3f7);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 12px 40px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(79, 195, 247, 0.35);
        }
        .btn-evaluate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(79, 195, 247, 0.55);
        }
        .badge-section {
            font-size: 0.72rem;
            border-radius: 20px;
            padding: 4px 12px;
        }
        h1 { font-weight: 800; letter-spacing: -0.02em; }
    </style>
</head>
<body class="py-5">

<div class="container" style="max-width: 860px;">

    <!-- Header -->
    <div class="text-center mb-4">
        <div class="mb-3">
            <i class="bi bi-airplane-fill text-info" style="font-size: 3rem;"></i>
        </div>
        <h1 class="text-white fs-2">Motor de Reglas de Aerolínea</h1>
        <p class="text-secondary">Complete el formulario para evaluar las reglas de negocio Drools aplicables al vuelo</p>
    </div>

    <!-- Form Card -->
    <div class="main-card p-4 p-md-5">
        <form th:action="@{/airline/evaluate}" th:object="${airlineRequest}" method="post">

            <!-- ── SECCIÓN PASAJERO ── -->
            <div class="section-card p-4 mb-4">
                <div class="d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-person-fill text-info fs-5"></i>
                    <span class="section-title text-info">Datos del Pasajero</span>
                </div>
                <div class="row g-3">
                    <!-- Edad -->
                    <div class="col-md-4">
                        <label for="passenger-age" class="form-label">Edad</label>
                        <input type="number" id="passenger-age" class="form-control"
                               th:field="*{passenger.age}" min="0" placeholder="Ej: 35"/>
                    </div>
                    <!-- Membresía -->
                    <div class="col-md-4">
                        <label for="passenger-membership" class="form-label">Membresía</label>
                        <select id="passenger-membership" class="form-select" th:field="*{passenger.membership}">
                            <option value="Basic">Basic</option>
                            <option value="Gold">Gold</option>
                            <option value="Platinum">Platinum</option>
                        </select>
                    </div>
                    <!-- Preferencia de asiento -->
                    <div class="col-md-4">
                        <label for="passenger-seatPreference" class="form-label">Preferencia de Asiento</label>
                        <select id="passenger-seatPreference" class="form-select" th:field="*{passenger.seatPreference}">
                            <option value="Any">Any (Sin preferencia)</option>
                            <option value="Window">Window (Ventana)</option>
                            <option value="Aisle">Aisle (Pasillo)</option>
                        </select>
                    </div>
                    <!-- Viaja con niños -->
                    <div class="col-12 mt-1">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch"
                                   id="passenger-travelingWithChildren"
                                   th:field="*{passenger.travelingWithChildren}"/>
                            <label class="form-check-label" for="passenger-travelingWithChildren">
                                Viaja acompañado de menores de edad
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── SECCIÓN VUELO ── -->
            <div class="section-card p-4 mb-4">
                <div class="d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-airplane text-warning fs-5"></i>
                    <span class="section-title text-warning">Datos del Vuelo</span>
                </div>
                <div class="row g-3">
                    <!-- Retraso -->
                    <div class="col-md-6">
                        <label for="flight-delayMinutes" class="form-label">Retraso del vuelo (minutos)</label>
                        <input type="number" id="flight-delayMinutes" class="form-control"
                               th:field="*{flight.delayMinutes}" min="0" placeholder="Ej: 90"/>
                    </div>
                    <!-- Duración -->
                    <div class="col-md-6">
                        <label for="flight-durationHours" class="form-label">Duración del vuelo (horas)</label>
                        <input type="number" id="flight-durationHours" class="form-control"
                               th:field="*{flight.durationHours}" min="0" step="0.5" placeholder="Ej: 6.5"/>
                    </div>
                    <!-- Asiento de emergencia -->
                    <div class="col-12 mt-1">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch"
                                   id="flight-emergencySeatAvailable"
                                   th:field="*{flight.emergencySeatAvailable}"/>
                            <label class="form-check-label" for="flight-emergencySeatAvailable">
                                Asiento de salida de emergencia disponible
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── SECCIÓN EQUIPAJE ── -->
            <div class="section-card p-4 mb-4">
                <div class="d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-bag-fill text-success fs-5"></i>
                    <span class="section-title text-success">Equipaje</span>
                </div>
                <div class="row g-3">
                    <div class="col-md-5">
                        <label for="luggageWeightKg" class="form-label">Peso del equipaje (kg)</label>
                        <input type="number" id="luggageWeightKg" class="form-control"
                               th:field="*{luggageWeightKg}" min="0" step="0.1" placeholder="Ej: 18.5"/>
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <div class="text-center mt-2">
                <button type="submit" class="btn btn-evaluate text-white">
                    <i class="bi bi-cpu me-2"></i>Evaluar Reglas de Vuelo
                </button>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmBXZ2PwuFq7X1jjgVQs0aJJHFH"
        crossorigin="anonymous"></script>
</body>
</html>
